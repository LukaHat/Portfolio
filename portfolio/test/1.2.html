            }
            else {
                provjeraNule++;
            }
            a2 = +prompt();

                umnozak = a2 * umnozak;

            }

            else {

            }

            if (a4 != 0) {
                umnozak = a4 * umnozak;
                document.write(umnozak, "<br>");
            }
            else {
                provjeraNule++;
            }
            a5 = +prompt();

                umnozak = a5 * umnozak;
                document.write(umnozak, "<br>");
            }
            else {
                provjeraNule++;
            }

            if (a6 != 0) {
                umnozak = a6 * umnozak;
                document.write(umnozak, "<br>");
            }
            else {
                provjeraNule++;
            }
            a7 = +prompt();
            if (a7 != 0) {
                umnozak = a7 * umnozak;
                document.write(umnozak, "<br>");
            }
            else {
                provjeraNule++;
            }
            if (provjeraNule > 0) {
                document.write("Učitavana nula")
            }
        }
        test();
    </script>
</body>
