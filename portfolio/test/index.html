<html>

<body>
    <script>
        function prviZadatak() {
            var a, b, c;
            a = +prompt();
            b = +prompt()
            if (b == 0) {
                document.write("Ne smije se dijeliti s nulom");
            }
            else {
                c = a / b;
                document.write("Prvi učitani broj=", a, "<br>", "Drugi učitani broj=", b, "<br>", "Rezultat dijeljenja=", c);
            }
        }
        prviZadatak();
    </script>
</body>

</html>
