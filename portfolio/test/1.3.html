<html>

<body>
    <script>
        function test() {
            var tisucuKuna, petstoKuna, dvjestoKuna, stoKuna, pedesetKuna, dvadesetKuna, desetKuna, petKuna, dvijeKune, jednaKuna, pedesetLipa, dvadesetLipa, desetLipa, petLipa, zbroj = 0;
            tisucuKuna = +prompt("Koliko je novčanica od 1000 kn?");

            if (tisucuKuna < 0) {
                document.write("Učitan negativan broj", "<br>");
                tisucuKuna = tisucuKuna * -1;
                zbroj = zbroj + tisucuKuna * 1000
                document.write("1000kn * ", tisucuKuna, "=", zbroj, "kn");
            }
            else {
                if (tisucuKuna !== parseInt(tisucuKuna)) {

                    tisucuKuna = parseInt(tisucuKuna);
                    zbroj = zbroj + tisucuKuna * 1000;
                    document.write("Učitana ne cjelobrojna vrijednost", "<br>", "1000kn * ", tisucuKuna, "=", zbroj, "kn")
                }
                else {
                    zbroj = zbroj + tisucuKuna * 1000;
                    document.write("1000kn * ", tisucuKuna, "=", zbroj, "kn");
                }

            }

        }
        test();
    </script>
</body>

</html>
