<!--Ispisite u stupac sve brojeve od m do n a u stupac do kumulativ tih brojeva-->
<html>

<body>
    <script>
        function test1() {
            var m, sum = 0, n;
            m = +prompt();
            n = +prompt();
            for (var i = m; i <= n; i++) {
                sum = sum + i;
                document.write(i, " ", sum, "<br>");
            }
        }
        test1();
    </script>
</body>

</html>
